<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aura Fitness — Interactive App</title>
<link rel="stylesheet" href="styles/aura.css">
<script>window.__AURA_EMBED = true;</script>
<style>
  html,body{height:100%;}
  body{background:oklch(0.90 0.006 75);display:grid;place-items:center;overflow:hidden;margin:0;}
  #stage{transform-origin:center center;}

  /* ── week bar + calendar + planned exercise rows (from gallery) ── */
  .wk { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:9px 0 8px; border-radius:16px; cursor:pointer; }
  .wk span { font-size:11px; font-weight:700; color:var(--text-3); }
  .wk b { font-size:16px; font-weight:700; letter-spacing:-.01em; color:var(--text); }
  .wk .dot { width:5px; height:5px; border-radius:50%; margin-top:1px; }
  .wk.sel { background:var(--accent); }
  .wk.sel span, .wk.sel b { color:var(--on-accent); }
  .dot.done { background:var(--green); } .dot.plan { background:var(--accent); } .dot.rest { background:var(--text-3); }
  .wk.sel .dot { background:#fff !important; }
  .ex-line { display:flex; align-items:center; gap:12px; }
  .ex-n { width:22px; height:22px; border-radius:7px; background:var(--fill); display:grid; place-items:center; font-size:12px; font-weight:700; color:var(--text-2); flex:0 0 auto; }
  .ex-t { font-size:15px; font-weight:600; letter-spacing:-.01em; }
  .ex-s { font-size:12.5px; color:var(--text-2); margin-top:1px; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px 0; }
  .cal-grid.head span { text-align:center; font-size:12px; font-weight:700; color:var(--text-3); padding:6px 0; }
  .cal-d { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:15px; font-weight:600; border-radius:50%; position:relative; }
  .cal-d .dot { width:5px; height:5px; border-radius:50%; position:absolute; bottom:6px; }
  .cal-d.off { color:var(--text-3); opacity:.4; }
  .cal-d.today { background:var(--accent); color:var(--on-accent); }
  .cal-d.today .dot { background:#fff; }
  .cal-d.seld { box-shadow: inset 0 0 0 2px var(--accent); }
  .leg { display:inline-flex; align-items:center; gap:5px; color:var(--text-2); } .leg .dot { width:7px; height:7px; border-radius:50%; }

  /* ── Plan tab component styles ── */
  .search{display:flex;align-items:center;gap:8px;background:var(--fill);border-radius:var(--r-sm);padding:10px 13px;margin-bottom:4px;}
  .search input{flex:1;border:0;background:none;font-family:var(--font);font-size:15px;color:var(--text);outline:none;}
  .src-card{display:flex;align-items:center;gap:12px;width:100%;background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-lg);padding:13px 14px;cursor:pointer;text-align:left;}
  .src-ic{width:44px;height:44px;border-radius:var(--r-md);display:grid;place-items:center;flex:0 0 auto;}
  .src-t{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--text);}
  .src-s{font-size:13px;color:var(--text-2);margin-top:2px;}
  .lib-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-lg);padding:12px 14px;}
  .lib-thumb{width:46px;height:46px;border-radius:var(--r-md);flex:0 0 auto;}
  .lib-title{font-weight:700;font-size:15px;letter-spacing:-.01em;color:var(--text);}
  .lib-meta{font-size:12px;color:var(--text-2);margin-top:2px;}
  .tag-dot{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--text-3);vertical-align:middle;margin:0 3px;}
  .catalog{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .hint-card{display:flex;align-items:flex-start;gap:11px;background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-md);padding:13px 14px;}
  .cat-item{background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-md);padding:10px;cursor:pointer;}
  .cat-thumb{width:100%;aspect-ratio:4/3;border-radius:var(--r-sm);margin-bottom:7px;}
  .cat-name{font-size:13px;font-weight:700;letter-spacing:-.01em;color:var(--text);}
  .cat-meta{font-size:11px;color:var(--text-3);margin-top:2px;}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
  .field label{font-size:12px;font-weight:700;color:var(--text-2);letter-spacing:.02em;}
  .field input,.field select,.field textarea{background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-sm);padding:10px 12px;font-family:var(--font);font-size:15px;color:var(--text);outline:none;width:100%;}
  .subtabs { display:flex; gap:6px; padding:2px 0 4px; overflow-x:auto; }
  .subtabs::-webkit-scrollbar { display:none; }
  .subtab { flex:0 0 auto; font-size:14px; font-weight:700; padding:8px 14px; border-radius:999px; background:var(--fill); color:var(--text-2); border:0; cursor:pointer; white-space:nowrap; }
  .subtab.active { background:var(--text); color:var(--bg); }
  .filters { display:flex; gap:8px; overflow-x:auto; padding:2px 0; scrollbar-width:none; -ms-overflow-style:none; }
  .filters::-webkit-scrollbar { display:none; }
  .plan-scroll{display:flex;gap:12px;overflow-x:auto;padding:2px 0 6px;margin:0 -14px;padding-left:14px;padding-right:14px;}
  .plan-scroll::-webkit-scrollbar{display:none;}
  .plan-card{flex:0 0 230px;border-radius:var(--r-lg);padding:14px;color:#fff;position:relative;overflow:hidden;min-height:124px;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer;}
  .plan-card .pc-bg{position:absolute;inset:0;background:linear-gradient(150deg,var(--accent),oklch(0.62 0.16 40));}
  .plan-card.alt .pc-bg{background:linear-gradient(150deg,oklch(0.5 0.07 250),oklch(0.4 0.05 270));}
  .plan-card.alt2 .pc-bg{background:linear-gradient(150deg,oklch(0.5 0.09 160),oklch(0.4 0.06 180));}
  .plan-card>*{position:relative;}
  .plan-add{flex:0 0 80px;border:2px dashed var(--separator);border-radius:var(--r-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--text-2);cursor:pointer;min-height:110px;}
  .dragging { opacity:.35 !important; border-style:dashed !important; }
  .wday{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-md);margin-bottom:8px;}

  /* ── Active Workout component styles ── */
  .mini-card{flex:1;background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-md);padding:11px 13px;}
  .mini-head{font-size:11px;font-weight:700;color:var(--text-2);display:flex;align-items:center;gap:5px;letter-spacing:.01em;}
  .mini-val{font-size:18px;font-weight:800;letter-spacing:-.02em;margin-top:5px;font-variant-numeric:tabular-nums;}
  .mini-sub{font-size:11px;color:var(--text-3);margin-top:2px;line-height:1.3;}
  .ex-video{position:relative;}
  .warm-head{display:flex;align-items:center;gap:10px;width:100%;background:none;border:0;padding:14px 16px;cursor:pointer;color:var(--text);}
  .warm-body{padding:0 16px 8px;}
  .warm-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-top:1px solid var(--separator-2);font-size:14px;font-weight:500;}
  .warm-n{width:30px;height:24px;border-radius:7px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:12px;font-weight:800;}
  .sets{display:flex;flex-direction:column;gap:8px;}
  .set-block{}
  .set-row{display:flex;align-items:center;gap:9px;}
  .set-no{width:40px;height:48px;border-radius:var(--r-sm);background:var(--fill);border:0;font-family:var(--font);font-size:16px;font-weight:800;color:var(--text);cursor:pointer;flex:0 0 auto;}
  .set-input{flex:1;height:48px;background:var(--surface-2);border:1px solid var(--separator-2);border-radius:var(--r-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .set-input input{width:100%;text-align:center;border:0;background:none;font-family:var(--font);font-size:18px;font-weight:800;color:var(--text);outline:none;font-variant-numeric:tabular-nums;}
  .set-input label{font-size:9px;font-weight:700;color:var(--text-3);letter-spacing:.04em;text-transform:uppercase;margin-top:-2px;}
  .set-check{width:48px;height:48px;border-radius:var(--r-sm);background:var(--fill);border:0;color:var(--text-3);display:grid;place-items:center;cursor:pointer;flex:0 0 auto;}
  .set-check.on{background:var(--green);color:#fff;}
  .set-row.done .set-input{background:color-mix(in oklab,var(--green) 9%,var(--surface));border-color:color-mix(in oklab,var(--green) 22%,transparent);}
  .set-note-btn{width:34px;height:48px;background:none;border:0;color:var(--text-3);cursor:pointer;display:grid;place-items:center;flex:0 0 auto;}
  .set-note{display:flex;align-items:center;gap:10px;padding:8px 0 2px 49px;}
  .set-note input{flex:1;border:0;border-bottom:1px solid var(--separator);background:none;font-family:var(--font);font-size:13px;color:var(--text);outline:none;padding:4px 0;}
  .set-del{background:none;border:0;color:var(--red);font-family:var(--font);font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap;}
  .ex-card{display:flex;align-items:center;gap:10px;width:100%;background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-lg);padding:14px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow-sm);}
  .ex-card.done{opacity:.62;}
  .ex-grip{flex:0 0 auto;display:flex;cursor:grab;}
  .ex-grip:active{cursor:grabbing;}
  .mini-bar{height:5px;border-radius:999px;background:var(--track);overflow:hidden;margin-top:9px;}
  .mini-bar>i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .3s;}
  .rest-pill{position:absolute;z-index:60;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--separator);border-radius:999px;padding:7px 9px 7px 7px;box-shadow:0 8px 30px #0003;cursor:grab;touch-action:none;user-select:none;}
  .rest-pill:active{cursor:grabbing;}
  .rest-ring{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;}
  .rest-ring::after{content:"";position:absolute;width:26px;height:26px;border-radius:50%;background:var(--surface);}
  .rest-ring>span{position:relative;z-index:1;}
  .rest-mini{width:30px;height:30px;border-radius:50%;background:var(--fill);border:0;color:var(--text);font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;display:grid;place-items:center;flex:0 0 auto;}
  .celeb{position:absolute;inset:0;z-index:80;display:grid;place-items:center;background:#0005;backdrop-filter:blur(2px);animation:fade .2s;}
  .celeb-card{background:var(--surface);border-radius:var(--r-xl);padding:28px 30px;text-align:center;box-shadow:0 20px 60px #0004;animation:pop .35s cubic-bezier(.2,1.3,.4,1);}
  @keyframes pop{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .summary-hero{background:linear-gradient(160deg,var(--accent),oklch(0.66 0.17 45));color:#fff;text-align:center;padding:64px 24px 50px;}
  .sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 8px;}
  .sum-stat{text-align:center;}
  .notes-area{width:100%;min-height:84px;border:1px solid var(--separator-2);border-radius:var(--r-md);background:var(--surface);padding:13px;font-family:var(--font);font-size:14px;color:var(--text);outline:none;resize:none;margin-top:6px;}
  .search-box{display:flex;align-items:center;gap:8px;background:var(--fill);border-radius:var(--r-sm);padding:10px 13px;}
  .search-box input{flex:1;border:0;background:none;font-family:var(--font);font-size:15px;color:var(--text);outline:none;}
  .round-card{background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px;}
  .round-header{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--separator-2);}
  .round-ex{padding:10px 14px;}
  .ex-label{font-size:11px;font-weight:700;color:var(--text-3);margin-bottom:7px;display:flex;align-items:center;gap:5px;}
  .ex-label-pill{width:16px;height:16px;border-radius:4px;color:#fff;font-size:9px;font-weight:800;display:grid;place-items:center;flex-shrink:0;}
  .ex-card.ss-first,.ex-card.ss-second{border-color:color-mix(in oklab,var(--accent) 28%,transparent);}
  .set-del-btn{width:48px;height:48px;border-radius:var(--r-sm);background:color-mix(in oklab,var(--red) 12%,transparent);border:0;color:var(--red);display:grid;place-items:center;cursor:pointer;flex:0 0 auto;}
  .ex-more-btn{opacity:.55;transition:opacity .15s;}
  .ex-card:hover .ex-more-btn,.ex-more-btn:focus{opacity:1;}
  .ex-card.dragging{opacity:.35;border-style:dashed !important;}
</style>
</head>
<body>
  <div id="stage"><div id="root"></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="workout/icons.jsx"></script>
  <script type="text/babel" src="plan/data.jsx"></script>
  <script type="text/babel" src="plan/exercise-detail.jsx"></script>
  <script type="text/babel" src="workout/data.jsx"></script>
  <script type="text/babel" src="workout/exercise.jsx"></script>
  <script type="text/babel" src="workout/superset.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="plan/app.jsx"></script>
  <script type="text/babel" src="workout/app.jsx"></script>
  <script type="text/babel" src="combined/ui.jsx"></script>
  <script type="text/babel" src="combined/progress.jsx"></script>
  <script type="text/babel" src="combined/profile.jsx"></script>
  <script type="text/babel" src="combined/log.jsx"></script>
  <script type="text/babel" src="combined/shell.jsx"></script>

  <script>
    function fit(){ const s=document.getElementById('stage'); const sc=Math.min((window.innerWidth-24)/393,(window.innerHeight-24)/852,1); s.style.transform='scale('+sc+')'; }
    window.addEventListener('resize',fit); fit(); setTimeout(fit,400);
  </script>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 84" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="84" fill="#f6f4ef"/>
      <rect x="40" y="10" width="40" height="64" rx="7" fill="#D97757" opacity=".14"/>
      <rect x="46" y="60" width="28" height="8" rx="2" fill="#D97757" opacity=".5"/>
      <circle cx="52" cy="64" r="1.6" fill="#D97757"/><circle cx="60" cy="64" r="1.6" fill="#D97757"/><circle cx="68" cy="64" r="1.6" fill="#D97757"/>
      <rect x="46" y="20" width="28" height="5" rx="2.5" fill="#D97757"/>
      <rect x="46" y="30" width="20" height="3" rx="1.5" fill="#D97757" opacity=".5"/>
      <rect x="46" y="38" width="24" height="3" rx="1.5" fill="#D97757" opacity=".4"/>
    </svg>
  </template>

  <script>
    // Emit aura:scroll when any .screen-body scrolls
    (function() {
      var lastY = {}, ticking = false, idx = 0;
      document.addEventListener('scroll', function(e) {
        var el = e.target;
        if (!el || !el.classList || !el.classList.contains('screen-body')) return;
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(function() {
          if (!el.dataset.scrollId) el.dataset.scrollId = ++idx;
          var id = el.dataset.scrollId;
          var cur = el.scrollTop;
          var prev = lastY[id] || 0;
          var dir = cur > prev + 4 ? 'down' : cur < prev - 4 ? 'up' : null;
          lastY[id] = cur;
          if (dir) window.dispatchEvent(new CustomEvent('aura:scroll', { detail: { dir: dir } }));
          ticking = false;
        });
      }, true);
    })();
  </script>
</body>
</html>
