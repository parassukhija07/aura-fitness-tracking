<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aura · Active Workout (Interactive)</title>
<link rel="stylesheet" href="styles/aura.css">
<style>
  html,body{height:100%;}
  body{background:oklch(0.90 0.006 75);display:grid;place-items:center;overflow:hidden;}
  #stage{transform-origin:center center;}
  /* mini cards (PR / target) */
  .mini-card{flex:1;background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-md);padding:11px 13px;}
  .mini-head{font-size:11px;font-weight:700;color:var(--text-2);display:flex;align-items:center;gap:5px;letter-spacing:.01em;}
  .mini-val{font-size:18px;font-weight:800;letter-spacing:-.02em;margin-top:5px;font-variant-numeric:tabular-nums;}
  .mini-sub{font-size:11px;color:var(--text-3);margin-top:2px;line-height:1.3;}
  .ex-video{position:relative;}
  /* warmup */
  .warm-head{display:flex;align-items:center;gap:10px;width:100%;background:none;border:0;padding:14px 16px;cursor:pointer;color:var(--text);}
  .warm-body{padding:0 16px 8px;}
  .warm-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-top:1px solid var(--separator-2);font-size:14px;font-weight:500;}
  .warm-n{width:30px;height:24px;border-radius:7px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:12px;font-weight:800;}
  /* hint */
  .hint-card{display:flex;gap:11px;background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-md);padding:13px 14px;}
  /* sets */
  .sets{display:flex;flex-direction:column;gap:8px;}
  .set-block{}
  .set-row{display:flex;align-items:center;gap:9px;}
  .set-no{width:40px;height:48px;border-radius:var(--r-sm);background:var(--fill);border:0;font-family:var(--font);font-size:16px;font-weight:800;color:var(--text);cursor:pointer;flex:0 0 auto;}
  .set-input{flex:1;height:48px;background:var(--surface-2);border:1px solid var(--separator-2);border-radius:var(--r-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .set-input input{width:100%;text-align:center;border:0;background:none;font-family:var(--font);font-size:18px;font-weight:800;color:var(--text);outline:none;font-variant-numeric:tabular-nums;}
  .set-input label{font-size:9px;font-weight:700;color:var(--text-3);letter-spacing:.04em;text-transform:uppercase;margin-top:-2px;}
  .set-check{width:48px;height:48px;border-radius:var(--r-sm);background:var(--fill);border:0;color:var(--text-3);display:grid;place-items:center;cursor:pointer;flex:0 0 auto;}
  .set-check.on{background:var(--green);color:#fff;}
  .set-row.done .set-input{background:color-mix(in oklab,var(--green) 9%,var(--surface));border-color:color-mix(in oklab,var(--green) 22%,transparent);}
  .set-note-btn{width:34px;height:48px;background:none;border:0;color:var(--text-3);cursor:pointer;display:grid;place-items:center;flex:0 0 auto;}
  .set-note{display:flex;align-items:center;gap:10px;padding:8px 0 2px 49px;}
  .set-note input{flex:1;border:0;border-bottom:1px solid var(--separator);background:none;font-family:var(--font);font-size:13px;color:var(--text);outline:none;padding:4px 0;}
  .set-del{background:none;border:0;color:var(--red);font-family:var(--font);font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap;}
  /* overview ex cards */
  .ex-card{display:flex;align-items:center;gap:10px;width:100%;background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-lg);padding:14px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow-sm);}
  .ex-card.done{opacity:.62;}
  .ex-grip{flex:0 0 auto;display:flex;}
  .mini-bar{height:5px;border-radius:999px;background:var(--track);overflow:hidden;margin-top:9px;}
  .mini-bar>i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .3s;}
  /* rest pill */
  .rest-pill{position:absolute;z-index:60;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--separator);border-radius:999px;padding:7px 9px 7px 7px;box-shadow:0 8px 30px #0003;cursor:grab;touch-action:none;user-select:none;}
  .rest-pill:active{cursor:grabbing;}
  .rest-ring{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;}
  .rest-ring::after{content:"";position:absolute;width:26px;height:26px;border-radius:50%;background:var(--surface);}
  .rest-ring>span{position:relative;z-index:1;}
  .rest-mini{width:30px;height:30px;border-radius:50%;background:var(--fill);border:0;color:var(--text);font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;display:grid;place-items:center;flex:0 0 auto;}
  /* celebration */
  .celeb{position:absolute;inset:0;z-index:80;display:grid;place-items:center;background:#0005;backdrop-filter:blur(2px);animation:fade .2s;}
  .celeb-card{background:var(--surface);border-radius:var(--r-xl);padding:28px 30px;text-align:center;box-shadow:0 20px 60px #0004;animation:pop .35s cubic-bezier(.2,1.3,.4,1);}
  @keyframes pop{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  /* summary */
  .summary-hero{background:linear-gradient(160deg,var(--accent),oklch(0.66 0.17 45));color:#fff;text-align:center;padding:64px 24px 50px;}
  .sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 8px;}
  .sum-stat{text-align:center;}
  .notes-area{width:100%;min-height:84px;border:1px solid var(--separator-2);border-radius:var(--r-md);background:var(--surface);padding:13px;font-family:var(--font);font-size:14px;color:var(--text);outline:none;resize:none;margin-top:6px;}
  .search-box{display:flex;align-items:center;gap:8px;background:var(--fill);border-radius:var(--r-sm);padding:10px 13px;}
  .search-box input{flex:1;border:0;background:none;font-family:var(--font);font-size:15px;color:var(--text);outline:none;}
  /* superset overview connector */
  .round-card{background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px;}
  .round-header{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--separator-2);}
  .round-ex{padding:10px 14px;}
  .ex-label{font-size:11px;font-weight:700;color:var(--text-3);margin-bottom:7px;display:flex;align-items:center;gap:5px;}
  .ex-label-pill{width:16px;height:16px;border-radius:4px;color:#fff;font-size:9px;font-weight:800;display:grid;place-items:center;flex-shrink:0;}
  .ex-card.ss-first,.ex-card.ss-second{border-color:color-mix(in oklab,var(--accent) 28%,transparent);}
  .set-del-btn{width:48px;height:48px;border-radius:var(--r-sm);background:color-mix(in oklab,var(--red) 12%,transparent);border:0;color:var(--red);display:grid;place-items:center;cursor:pointer;flex:0 0 auto;transition:background .12s;}
  .set-del-btn:active{background:color-mix(in oklab,var(--red) 22%,transparent);}
  .ex-more-btn{opacity:.55;transition:opacity .15s;}
  .ex-card:hover .ex-more-btn,.ex-more-btn:focus{opacity:1;}
  .ex-more-btn:active{opacity:1;background:var(--fill)!important;}
  .nav-btn-icon{min-width:36px;padding:0;justify-content:center;}
  .ex-card.dragging{opacity:.35;border-style:dashed !important;}
  .ex-card[draggable]:hover .ex-grip{color:var(--accent) !important;}
  .ex-grip{cursor:grab;}
  .ex-grip:active{cursor:grabbing;}
</style>
</head>
<body>
  <div id="stage"><div id="root"></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="workout/icons.jsx"></script>
  <script type="text/babel" src="plan/data.jsx"></script>
  <script type="text/babel" src="plan/exercise-detail.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="workout/data.jsx"></script>
  <script type="text/babel" src="workout/exercise.jsx"></script>
  <script type="text/babel" src="workout/superset.jsx"></script>
  <script type="text/babel" src="workout/app.jsx"></script>
  <script>
    function fit(){ const s=document.getElementById('stage'); const sc=Math.min(window.innerWidth/393,window.innerHeight/852,1); s.style.transform='scale('+sc+')'; }
    window.addEventListener('resize',fit); fit(); setTimeout(fit,400);
  </script>
</body>
</html>
