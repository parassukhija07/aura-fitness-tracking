name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: List available Xcode/platform versions
        run: |
          ls /Applications | grep -i xcode || true
          xcodebuild -showsdks || true

      - name: Ensure iOS platform SDK is installed
        run: |
          # Pinning to a specific old Xcode (e.g. 16.1) can outlive that
          # version's bundled iOS platform on the runner image once GitHub
          # deprecates its simulator/device runtimes (see
          # actions/runner-images#13392), so we now float to
          # 'latest-stable' above. This step is a safety net for the rare
          # case the selected Xcode still lacks the iOS device platform.
          if ! xcodebuild -showsdks | grep -q iphoneos; then
            sudo xcodebuild -downloadPlatform iOS
          fi
          xcodebuild -showsdks

      - name: Install xcpretty
        run: gem install xcpretty --no-document || true
      
      - name: Generate Secrets.xcconfig
        run: |
          echo "SUPABASE_URL = ${{ secrets.SUPABASE_URL }}" > AuraFitness/Secrets.xcconfig
          echo "SUPABASE_ANON_KEY = ${{ secrets.SUPABASE_ANON_KEY }}" >> AuraFitness/Secrets.xcconfig

      - name: Link JSON to Xcode Project
        run: |
          gem install xcodeproj
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('AuraFitness.xcodeproj')
          target = project.targets.first
          file = project.new_file('gym_exercise_library.json')
          target.resources_build_phase.add_file_reference(file)
          project.save
          "
      - name: Fix Missing Swift Files and Duplicates
        run: |
          gem install xcodeproj
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('AuraFitness.xcodeproj')
          target = project.targets.first

          # 1. Fix the duplicate SaveEditScopeSheet.swift warning
          duplicates = target.source_build_phase.files.select { |f| f.file_ref && f.file_ref.path && f.file_ref.path.include?('SaveEditScopeSheet.swift') }
          if duplicates.count > 1
            target.source_build_phase.remove_build_file(duplicates.last)
          end

          # 2. Find and link the missing Swift views
          missing_files = ['WeekStripView.swift', 'YouTubePlayerView.swift', 'ExerciseVideoView.swift']
          
          missing_files.each do |filename|
            Dir.glob(%Q[AuraFitness/**/#{filename}]).each do |path|
              # Only add if it hasn't been linked already
              unless target.source_build_phase.files.any? { |f| f.file_ref && f.file_ref.path && f.file_ref.path.include?(filename) }
                file_ref = project.new_file(path)
                target.source_build_phase.add_file_reference(file_ref)
                puts 'Successfully linked ' + filename
              end
            end
          end
          project.save
          "
             
      - name: Verify scheme
        run: xcodebuild -list -project AuraFitness.xcodeproj

      - name: Build
        run: |
          set -o pipefail
          if command -v xcpretty >/dev/null 2>&1; then
            xcodebuild build \
              -project AuraFitness.xcodeproj \
              -scheme AuraFitness \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              -derivedDataPath $RUNNER_TEMP/DerivedData \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              | xcpretty
          else
            xcodebuild build \
              -project AuraFitness.xcodeproj \
              -scheme AuraFitness \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              -derivedDataPath $RUNNER_TEMP/DerivedData \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO
          fi

      - name: Package .ipa
        run: |
          APP_PATH=$(find $RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name "AuraFitness.app" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then echo "ERROR: AuraFitness.app not found in Release-iphoneos products"; exit 1; fi
          mkdir -p $RUNNER_TEMP/ipa-staging/Payload
          cp -R "$APP_PATH" $RUNNER_TEMP/ipa-staging/Payload/
          cd $RUNNER_TEMP/ipa-staging
          zip -r $RUNNER_TEMP/AuraFitness.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuraFitness-unsigned-${{ github.run_number }}
          path: ${{ runner.temp }}/AuraFitness.ipa
          retention-days: 30
