<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aura · Plan Tab (Interactive)</title>
<link rel="stylesheet" href="styles/aura.css">
<style>
  html,body{height:100%;}
  body{background:oklch(0.90 0.006 75);display:grid;place-items:center;overflow:hidden;}
  #stage{transform-origin:center center;}
  .search{display:flex;align-items:center;gap:8px;background:var(--fill);border-radius:var(--r-sm);padding:10px 13px;margin-bottom:4px;}
  .search input{flex:1;border:0;background:none;font-family:var(--font);font-size:15px;color:var(--text);outline:none;}
  .src-card{display:flex;align-items:center;gap:12px;width:100%;background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-lg);padding:13px 14px;cursor:pointer;text-align:left;}
  .src-ic{width:44px;height:44px;border-radius:var(--r-md);display:grid;place-items:center;flex:0 0 auto;}
  .src-t{font-size:15px;font-weight:700;letter-spacing:-.01em;}
  .src-s{font-size:13px;color:var(--text-2);margin-top:2px;}
  .lib-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-lg);padding:12px 14px;}
  .lib-thumb{width:46px;height:46px;border-radius:var(--r-md);flex:0 0 auto;}
  .lib-title{font-weight:700;font-size:15px;letter-spacing:-.01em;}
  .lib-meta{font-size:12px;color:var(--text-2);margin-top:2px;}
  .tag-dot{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--text-3);vertical-align:middle;margin:0 3px;}
  .catalog{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .hint-card{display:flex;align-items:flex-start;gap:11px;background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-md);padding:13px 14px;}
  .cat-item{background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-md);padding:10px;cursor:pointer;}
  .cat-thumb{width:100%;aspect-ratio:4/3;border-radius:var(--r-sm);margin-bottom:7px;}
  .cat-name{font-size:13px;font-weight:700;letter-spacing:-.01em;}
  .cat-meta{font-size:11px;color:var(--text-3);margin-top:2px;}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
  .field label{font-size:12px;font-weight:700;color:var(--text-2);letter-spacing:.02em;}
  .field input,.field select,.field textarea{background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-sm);padding:10px 12px;font-family:var(--font);font-size:15px;color:var(--text);outline:none;width:100%;}
  /* subtabs */
  .subtabs { display:flex; gap:6px; padding:2px 0 4px; overflow-x:auto; }
  .subtabs::-webkit-scrollbar { display:none; }
  .subtab { flex:0 0 auto; font-size:14px; font-weight:700; padding:8px 14px; border-radius:999px; background:var(--fill); color:var(--text-2); border:0; cursor:pointer; white-space:nowrap; }
  .subtab.active { background:var(--text); color:var(--bg); }
  /* filters */
  .filters { display:flex; gap:8px; overflow-x:auto; padding:2px 0; }
  .filters::-webkit-scrollbar { display:none; }
  /* plan cards */
  .plan-scroll{display:flex;gap:12px;overflow-x:auto;padding:2px 0 6px;margin:0 -14px;padding-left:14px;padding-right:14px;}
  .plan-scroll::-webkit-scrollbar{display:none;}
  .plan-card{flex:0 0 230px;border-radius:var(--r-lg);padding:14px;color:#fff;position:relative;overflow:hidden;min-height:124px;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer;}
  .plan-card .pc-bg{position:absolute;inset:0;background:linear-gradient(150deg,var(--accent),oklch(0.62 0.16 40));}
  .plan-card.alt .pc-bg{background:linear-gradient(150deg,oklch(0.5 0.07 250),oklch(0.4 0.05 270));}
  .plan-card.alt2 .pc-bg{background:linear-gradient(150deg,oklch(0.5 0.09 160),oklch(0.4 0.06 180));}
  .plan-card>*{position:relative;}
  .plan-add{flex:0 0 80px;border:2px dashed var(--separator);border-radius:var(--r-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--text-2);cursor:pointer;min-height:110px;}
  /* drag reorder */
  .dragging { opacity:.35 !important; border-style:dashed !important; }
  /* wday rows */
  .wday{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface);border:1px solid var(--separator-2);border-radius:var(--r-md);margin-bottom:8px;}
  .wday-d{width:42px;height:42px;border-radius:11px;background:var(--fill);display:flex;flex-direction:column;align-items:center;justify-content:center;flex:0 0 auto;}
  .wday-d span{font-size:9px;font-weight:800;color:var(--text-3);letter-spacing:.04em;}
  .wday-d b{font-size:13px;}
  .wday-d.has{background:var(--accent-soft);}
  .wday-d.has span{color:var(--accent);}
  .wday-d.has b{color:var(--accent);}
</style>
</head>
<body>
<div id="stage">
  <div id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="workout/icons.jsx"></script>
<script type="text/babel" src="plan/data.jsx"></script>
<script type="text/babel" src="plan/exercise-detail.jsx"></script>
<script type="text/babel" src="plan/app.jsx"></script>

<script>
  // Scale phone to fit viewport
  (function scale() {
    const PH_W = 393, PH_H = 852, PAD = 40;
    const s = document.getElementById('stage');
    function fit() {
      const sc = Math.min((innerWidth - PAD) / PH_W, (innerHeight - PAD) / PH_H, 1);
      s.style.transform = `scale(${sc})`;
    }
    fit(); window.addEventListener('resize', fit);
  })();
</script>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 120 84" xmlns="http://www.w3.org/2000/svg">
    <rect width="120" height="84" fill="#f6f4ef"/>
    <rect x="40" y="10" width="40" height="64" rx="6" fill="#D97757" opacity=".15"/>
    <rect x="46" y="22" width="28" height="4" rx="2" fill="#D97757"/>
    <rect x="46" y="30" width="20" height="3" rx="1.5" fill="#D97757" opacity=".5"/>
    <rect x="46" y="38" width="24" height="3" rx="1.5" fill="#D97757" opacity=".4"/>
    <rect x="46" y="46" width="18" height="3" rx="1.5" fill="#D97757" opacity=".3"/>
  </svg>
</template>
</body>
</html>
